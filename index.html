<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoRest - Gestion de Mesas</title>
<style>
:root{
--bg-a:#05060d;
--bg-b:#0d1230;
--panel:rgba(19,23,46,0.72);
--border:rgba(124,58,237,0.35);
--border-soft:rgba(148,163,255,0.18);
--accent:#8b5cf6;
--accent2:#22d3ee;
--accent-grad:linear-gradient(135deg,#8b5cf6,#22d3ee);
--free:#2dffb0;
--occupied:#ffb347;
--dirty:#9ca3c4;
--danger:#ff3d6e;
--text:#e8ecfb;
--muted:#8993b8;
--radius:16px;
--shadow:0 10px 30px rgba(0,0,0,0.45);
--glow-accent:0 0 18px rgba(139,92,246,0.55);
--glow-cyan:0 0 18px rgba(34,211,238,0.5);
--glow-danger:0 0 20px rgba(255,61,110,0.8);
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;
background:
radial-gradient(circle at 15% 10%, rgba(139,92,246,0.18), transparent 40%),
radial-gradient(circle at 85% 15%, rgba(34,211,238,0.15), transparent 45%),
linear-gradient(180deg,var(--bg-a),var(--bg-b));
background-attachment:fixed;
color:var(--text); min-height:100vh;}
header{
background:rgba(10,12,26,0.75);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
padding:14px 22px;
display:flex;align-items:center;gap:18px;flex-wrap:wrap;
border-bottom:1px solid var(--border-soft);
box-shadow:0 4px 24px rgba(0,0,0,0.5);
position:relative;z-index:20;
}
header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--accent-grad);opacity:.7;}
header h1{
font-size:21px;margin:0;margin-right:4px;font-weight:800;letter-spacing:.5px;
background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;
text-shadow:0 0 24px rgba(139,92,246,0.35);
}
.live-indicator{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);background:rgba(255,255,255,0.04);padding:6px 12px;border-radius:20px;border:1px solid var(--border-soft);transition:all .2s;}
.live-indicator.alert{background:rgba(255,61,110,0.15);border-color:rgba(255,61,110,0.5);color:#ffd7e1;animation:alertPulse 1.4s infinite;}
@keyframes alertPulse{0%{box-shadow:0 0 0 0 rgba(255,61,110,0.5);}70%{box-shadow:0 0 0 10px rgba(255,61,110,0);}100%{box-shadow:0 0 0 0 rgba(255,61,110,0);}}
.live-dot{width:9px;height:9px;border-radius:50%;background:#64748b;transition:background .3s, box-shadow .3s;}
.live-dot.on{background:var(--free);box-shadow:0 0 10px 2px rgba(45,255,176,0.8);animation:pulseDot 1.6s infinite;}
.live-dot.off{background:var(--danger);box-shadow:0 0 10px 2px rgba(255,61,110,0.7);}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(45,255,176,0.6);}70%{box-shadow:0 0 0 8px rgba(45,255,176,0);}100%{box-shadow:0 0 0 0 rgba(45,255,176,0);}}
.floors{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.floor-tab{position:relative;padding:8px 14px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid var(--border-soft);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;color:#c7cdea;transition:all .18s;}
.floor-tab:hover{background:rgba(139,92,246,0.18);border-color:var(--accent);}
.floor-tab.active{background:var(--accent-grad);color:#0a0c1a;box-shadow:var(--glow-accent);font-weight:700;border-color:transparent;}
.floor-tab .mini-btn{opacity:.65;font-size:11px;padding:2px 6px;border-radius:6px;}
.floor-tab .mini-btn:hover{opacity:1;background:rgba(0,0,0,0.15);}
.floor-tab.active .mini-btn:hover{background:rgba(0,0,0,0.2);}
.add-floor-btn{padding:8px 14px;border-radius:20px;border:1.5px dashed rgba(139,92,246,0.5);background:transparent;cursor:pointer;color:#c7cdea;font-size:13px;transition:all .18s;}
.add-floor-btn:hover{background:rgba(139,92,246,0.12);border-color:var(--accent2);color:#fff;}
#canvas-wrap{position:relative;height:calc(100vh - 132px);overflow:auto;background-image:radial-gradient(circle,rgba(139,92,246,0.18) 1px,transparent 1.4px);background-size:28px 28px;}
#canvas{position:relative;min-width:100%;min-height:100%;}
.empty-hint{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:var(--muted);font-size:14px;text-align:center;pointer-events:none;width:80%;line-height:1.6;}
.table-el{position:absolute;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;user-select:none;touch-action:none;cursor:pointer;text-align:center;padding:4px;letter-spacing:.2px;
border:2px solid rgba(255,255,255,0.35);
box-shadow:0 8px 22px rgba(0,0,0,0.45), var(--glow-accent);
transition:box-shadow .2s, transform .15s;
}
.table-el:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,0.5), var(--glow-cyan);}
.table-el.square{border-radius:14px;}
.table-el.circle{border-radius:50%;}
.table-el .status-dot{position:absolute;bottom:-4px;left:-4px;width:15px;height:15px;border-radius:50%;border:2px solid rgba(10,12,26,0.9);}
.table-el .bell{position:absolute;top:-12px;right:-12px;width:26px;height:26px;border-radius:50%;background:rgba(17,20,40,0.9);border:2px solid var(--border-soft);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:#93a0c9;box-shadow:0 2px 8px rgba(0,0,0,0.4);transition:all .2s;}
.table-el .bell:hover{border-color:var(--accent2);color:#fff;}
.table-el .bell.active{background:var(--danger);color:#fff;border-color:var(--danger);box-shadow:var(--glow-danger);}
.table-el.blink{animation:blinkAnim 1.1s infinite;}
@keyframes blinkAnim{
0%{box-shadow:0 0 0 0 rgba(255,61,110,0.7), var(--glow-accent);}
50%{box-shadow:0 0 0 18px rgba(255,61,110,0), var(--glow-accent);}
100%{box-shadow:0 0 0 0 rgba(255,61,110,0), var(--glow-accent);}
}
#buildBar{position:fixed;left:0;right:0;bottom:0;background:rgba(10,12,26,0.85);backdrop-filter:blur(14px);border-top:1px solid var(--border-soft);z-index:50;box-shadow:0 -8px 26px rgba(0,0,0,0.5);}
#buildBar::before{content:"";position:absolute;left:0;right:0;top:-1px;height:1px;background:var(--accent-grad);opacity:.7;}
#buildToggle{position:absolute;right:20px;top:-52px;background:var(--accent-grad);color:#0a0c1a;border:none;border-radius:50%;width:52px;height:52px;cursor:pointer;font-size:20px;box-shadow:var(--glow-accent);}
#buildToggle:hover{filter:brightness(1.1);}
#buildPanel{display:none;padding:14px 20px;gap:14px;flex-wrap:wrap;align-items:center;}
#buildPanel.open{display:flex;}
.switch-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.switch{position:relative;display:inline-block;width:40px;height:22px;}
.switch input{opacity:0;width:0;height:0;}
.switch-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#2b2f4a;border-radius:22px;transition:.2s;border:1px solid var(--border-soft);}
.switch-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.switch input:checked + .switch-slider{background:var(--accent-grad);box-shadow:var(--glow-accent);}
.switch input:checked + .switch-slider:before{transform:translateX(18px);}
.btn{padding:9px 14px;border-radius:10px;border:1px solid var(--border-soft);background:rgba(255,255,255,0.04);cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;}
.btn:hover{background:rgba(139,92,246,0.16);border-color:var(--accent);}
.btn:active{transform:scale(0.97);}
.btn.primary{background:var(--accent-grad);color:#0a0c1a;border-color:transparent;font-weight:700;box-shadow:var(--glow-accent);}
.btn.primary:hover{filter:brightness(1.1);}
.btn.primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;}
.btn.danger{background:rgba(255,61,110,0.08);color:var(--danger);border-color:rgba(255,61,110,0.4);}
.btn.danger:hover{background:rgba(255,61,110,0.18);box-shadow:var(--glow-danger);}
.hint-bar{font-size:12px;color:var(--muted);}
.modal-overlay{position:fixed;inset:0;background:rgba(2,3,10,0.68);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:linear-gradient(180deg, rgba(24,27,52,0.98), rgba(14,16,34,0.98));border:1px solid var(--border-soft);border-radius:18px;width:380px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:20px;box-shadow:0 24px 60px rgba(0,0,0,0.6), var(--glow-accent);color:var(--text);}
.modal h2{margin-top:0;font-size:17px;display:flex;justify-content:space-between;align-items:center;color:var(--text);}
.modal .close-x{cursor:pointer;color:var(--muted);font-size:16px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);}
.modal .close-x:hover{background:rgba(255,255,255,0.14);color:#fff;}
.modal p{font-size:14px;color:var(--text);line-height:1.5;}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.form-row input[type=text], .form-row input[type=number], .form-row select{width:100%;padding:8px 10px;border:1px solid var(--border-soft);border-radius:8px;font-size:13px;background:rgba(255,255,255,0.04);color:var(--text);}
.form-row input:focus, .form-row select:focus{outline:2px solid var(--accent2);outline-offset:1px;}
.color-presets{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.color-presets span{display:inline-block;width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.25);transition:transform .15s;}
.color-presets span:hover{transform:scale(1.15);border-color:#fff;}
.item-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px;}
.item-row .name{flex:1;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border-soft);background:rgba(255,255,255,0.05);cursor:pointer;font-weight:700;color:var(--text);}
.qty-btn:hover{background:rgba(139,92,246,0.2);}
.totals{margin-top:12px;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px;font-size:13px;border:1px solid var(--border-soft);}
.totals .row{display:flex;justify-content:space-between;margin-bottom:6px;color:var(--muted);}
.totals .grand{font-weight:700;font-size:16px;color:#fff;border-top:1px solid var(--border-soft);padding-top:8px;margin-top:4px;}
.assist-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,179,71,0.1);border:1px solid rgba(255,179,71,0.35);padding:10px 12px;border-radius:10px;margin-bottom:12px;font-size:13px;gap:10px;}

.login-screen{position:fixed;inset:0;background:
radial-gradient(circle at 15% 10%, rgba(139,92,246,0.18), transparent 40%),
radial-gradient(circle at 85% 15%, rgba(34,211,238,0.15), transparent 45%),
linear-gradient(180deg,var(--bg-a),var(--bg-b));
display:flex;align-items:center;justify-content:center;z-index:300;}
.login-box{background:var(--panel);border:1px solid var(--border-soft);border-radius:20px;padding:28px 26px;width:320px;max-width:90vw;text-align:center;box-shadow:var(--shadow);}
.login-box h1{background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0 0 6px;font-size:24px;}
.login-box p{color:var(--muted);font-size:13px;margin:0 0 18px;}
.login-box .form-row{text-align:left;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:18px;}
.pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--border-soft);background:transparent;transition:all .15s;display:inline-block;}
.pin-dots span.filled{background:var(--accent-grad);border-color:transparent;box-shadow:var(--glow-accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-pad button{padding:14px 0;border-radius:12px;border:1px solid var(--border-soft);background:rgba(255,255,255,0.04);color:var(--text);font-size:18px;cursor:pointer;}
.pin-pad button:hover{background:rgba(139,92,246,0.18);border-color:var(--accent);}
.pin-pad button.wide{font-size:13px;color:var(--muted);}
.login-error{color:var(--danger);font-size:12px;min-height:16px;margin-bottom:8px;}
.role-badge{font-size:10px;padding:2px 8px;border-radius:10px;text-transform:uppercase;font-weight:700;letter-spacing:.4px;white-space:nowrap;}
.role-badge.admin{background:rgba(139,92,246,0.25);color:#c9b6ff;}
.role-badge.mesero{background:rgba(34,211,238,0.2);color:#8fe9fb;}
.role-badge.cocina{background:rgba(255,179,71,0.2);color:#ffcf94;}
.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);background:rgba(255,255,255,0.04);padding:6px 10px;border-radius:20px;border:1px solid var(--border-soft);margin-left:auto;}
.user-chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;text-decoration:underline;padding:0;}
.user-chip button:hover{color:#fff;}
.assign-tag{position:absolute;top:-10px;left:-10px;background:rgba(10,12,26,0.9);border:1px solid var(--border-soft);border-radius:10px;padding:2px 6px;font-size:10px;color:#c7cdea;max-width:74px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.table-el.dirty{opacity:.6;filter:grayscale(.5);}
.clean-tag{position:absolute;bottom:-10px;right:-10px;background:rgba(10,12,26,0.9);border:1px solid var(--border-soft);border-radius:10px;padding:2px 6px;font-size:10px;color:#c7cdea;white-space:nowrap;}
#kitchenView{padding:18px;display:none;flex-wrap:wrap;gap:14px;align-content:flex-start;height:calc(100vh - 132px);overflow-y:auto;}
.kview-card{background:var(--panel);border:1px solid var(--border-soft);border-radius:14px;padding:14px;width:260px;box-shadow:var(--shadow);height:fit-content;}
.kview-card h3{margin:0 0 4px;font-size:15px;}
.kview-card .kmeta{font-size:11px;color:var(--muted);margin-bottom:10px;}
.kview-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px;gap:8px;}
.kview-item.ready{opacity:.5;}
.kview-item button{padding:4px 10px;border-radius:8px;border:1px solid var(--border-soft);background:rgba(255,255,255,0.05);color:var(--text);font-size:11px;cursor:pointer;white-space:nowrap;}
.kview-item button:hover{background:rgba(34,211,238,0.2);border-color:var(--accent2);}
.kview-empty{color:var(--muted);font-size:14px;text-align:center;margin-top:60px;width:100%;}
.mini-color-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px;}
.mini-color-row span{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.25);display:inline-block;}
.mini-color-row span:hover{border-color:#fff;transform:scale(1.1);}
.readonly-note{background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);padding:8px 12px;border-radius:10px;font-size:12px;color:#c9b6ff;margin-bottom:12px;}
.cat-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.cat-filter-btn{padding:6px 12px;border-radius:16px;border:1px solid var(--border-soft);background:rgba(255,255,255,0.04);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;}
.cat-filter-btn:hover{background:rgba(139,92,246,0.15);color:#fff;}
.cat-filter-btn.active{background:var(--accent-grad);color:#0a0c1a;font-weight:700;border-color:transparent;}
.cat-tiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-bottom:14px;}
.cat-tile{background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.cat-tile:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--glow-accent);}
.cat-tile .cat-icon{font-size:24px;margin-bottom:6px;height:44px;display:flex;align-items:center;justify-content:center;}
.cat-tile .cat-icon img{width:100%;height:44px;object-fit:cover;border-radius:8px;}
.cat-tile .cat-name{font-size:12px;font-weight:700;}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px;max-height:280px;overflow-y:auto;padding:2px;margin-bottom:14px;}
.catalog-card{background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;}
.catalog-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--glow-accent);}
.catalog-card .thumb{width:100%;height:68px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--muted);}
.catalog-card .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.catalog-card .info{padding:6px 8px;}
.catalog-card .info .pname{font-size:11px;font-weight:600;line-height:1.25;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.catalog-card .info .pprice{font-size:11px;color:var(--accent2);font-weight:700;}
.catalog-empty{grid-column:1/-1;font-size:12px;color:var(--muted);text-align:center;padding:16px 0;}
.img-upload-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.img-preview{width:56px;height:56px;border-radius:10px;object-fit:cover;background:rgba(255,255,255,0.05);border:1px solid var(--border-soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted);overflow:hidden;}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-upload-row input[type=file]{flex:1;font-size:11px;color:var(--muted);}
.cat-tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.cat-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);border-radius:16px;padding:4px 6px 4px 12px;font-size:12px;cursor:pointer;}
.cat-chip:hover{border-color:var(--accent);}
.cat-chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;line-height:1;}
.cat-chip button:hover{color:#fff;}
.menu-item-row-admin{display:flex;align-items:center;gap:10px;}
.thumb-sm{width:38px;height:38px;border-radius:8px;object-fit:cover;background:rgba(255,255,255,0.05);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);overflow:hidden;}
.thumb-sm img{width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>
<div id="loginScreen" class="login-screen" style="display:none;"></div>
<div id="appRoot" style="display:none;">
<header>
<h1>AutoRest</h1>
<div class="live-indicator" id="liveIndicator"><span class="live-dot" id="liveDot"></span><span id="liveText">Conectando...</span></div>
<div class="floors" id="floorsContainer"></div>
<button class="add-floor-btn" id="addFloorBtn">+ Piso</button>
<button class="btn" id="kitchenToggleBtn" style="display:none;">&#127859; Cocina</button>
<div class="user-chip" id="userChip" style="display:none;"></div>
</header>
<div id="canvas-wrap">
<div id="canvas"></div>
<div id="kitchenView"></div>
</div>

<div id="buildBar">
<button id="buildToggle" title="Menu de construccion">&#128736;</button>
<div id="buildPanel">
<label class="switch-row">
<span class="switch">
<input type="checkbox" id="editModeChk">
<span class="switch-slider"></span>
</span>
Modo edicion (mover / crear)
</label>
<button class="btn" id="addCircleBtn">&#9711; Mesa circular</button>
<button class="btn" id="addSquareBtn">&#9635; Mesa cuadrada</button>
<button class="btn" id="menuBtn">&#127860; Gestionar menu</button>
<button class="btn" id="usersBtn">&#128101; Gestionar usuarios</button>
<span class="hint-bar" id="hintBar"></span>
</div>
</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>

const STORAGE_KEY = 'autorest_state_v1';
function defaultState(){
return {
floors: [
{id:'f1', name:'Piso 1', tables:[]},
{id:'f2', name:'Piso 2', tables:[]},
{id:'f3', name:'Piso 4', tables:[]},
{id:'f4', name:'Bodega', tables:[]},
{id:'f5', name:'Sotano', tables:[]}
],
activeFloor: 'f1',
menu: [],
categories: defaultCategories(),
users: []
};
}
function defaultCategories(){

function resizeImageToDataUrl(file, callback){

const img = new Image();
img.onload = function(){
const maxDim = 240;
let w = img.width, h = img.height;
if(w > h){ if(w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; } }
else{ if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; } }
const canvas = document.createElement('canvas');
canvas.width = w; canvas.height = h;
canvas.getContext('2d').drawImage(img, 0, 0, w, h);
callback(canvas.toDataURL('image/jpeg', 0.72));
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}

'<button class="qty-btn" data-act="remove">&times;</button>';
row.querySelector('[data-act="plus"]').onclick = function(){ item.qty++; refresh(); };
row.querySelector('[data-act="minus"]').onclick = function(){ item.qty = Math.max(1, item.qty - 1); refresh(); };
row.querySelector('[data-act="remove"]').onclick = function(){ table.items = table.items.filter(function(i){ return i.id !== item.id; }); refresh(); };
list.appendChild(row);
});
}
function refresh(){
renderItems();
const subtotal = table.items.reduce(function(s, i){ return s + i.price * i.qty; }, 0);
const tipPercent = parseFloat(tipPercentInp.value) || 0;
table.tipPercent = tipPercent;
table.tipEnabled = tipEnabledChk.checked;
const tip = table.tipEnabled ? subtotal * (tipPercent / 100) : 0;
overlay.querySelector('#subtotalVal').textContent = subtotal.toFixed(2);
overlay.querySelector('#tipVal').textContent = tip.toFixed(2);
overlay.querySelector('#totalVal').textContent = (subtotal + tip).toFixed(2);
renderCanvas();
renderKitchenView();
saveState();
}
tipEnabledChk.onchange = refresh;
tipPercentInp.oninput = refresh;
function doCharge(){
table.items = [];
table.assistance = false;
table.assignedTo = null;
table.dirty = true;
saveState();
overlay.remove();
renderCanvas();
renderKitchenView();
}
overlay.querySelector('#chargeBtn').onclick = function(){
if(table.items.length === 0){
showConfirm('La mesa no tiene productos. Deseas liberarla de todos modos?', doCharge);
} else {
showConfirm('Confirmar cobro y liberar la mesa?', doCharge);
}
};
refresh();
}

function renderKitchenView(){
const el = document.getElementById('kitchenView');
if(!el) return;
el.innerHTML = '';
let any = false;
state.floors.forEach(function(floor){
floor.tables.forEach(function(table){
if(!table.items || table.items.length === 0) return;
if(table.items.every(function(i){ return i.ready; })) return;
any = true;
const assignedUser = (state.users || []).find(function(u){ return u.id === table.assignedTo; });
const card = document.createElement('div');
card.className = 'kview-card';
card.innerHTML = '<h3>' + escapeHtml(floor.name) + ' - Mesa ' + escapeHtml(table.label) + '</h3>' +
'<div class="kmeta">' + (assignedUser ? 'Mesero: ' + escapeHtml(assignedUser.name) : 'Sin mesero asignado') + '</div>';
const itemsWrap = document.createElement('div');
table.items.forEach(function(item){
const row = document.createElement('div');
row.className = 'kview-item' + (item.ready ? ' ready' : '');
row.innerHTML = '<span>' + item.qty + 'x ' + escapeHtml(item.name) + '</span>';
const btn = document.createElement('button');
btn.textContent = item.ready ? 'Listo' : 'Marcar listo';
btn.disabled = item.ready;
btn.onclick = function(){
item.ready = true;
saveState();
renderKitchenView();
renderCanvas();
};
row.appendChild(btn);
itemsWrap.appendChild(row);
});
card.appendChild(itemsWrap);
el.appendChild(card);
});
});
if(!any){
el.innerHTML = '<div class="kview-empty">No hay comandas pendientes.</div>';
}
}

lastLoginHadUsers = state.users && state.users.length > 0;
document.getElementById('appRoot').style.display = 'none';
document.getElementById('loginScreen').style.display = 'flex';
renderLoginScreen();
initFirebase();
const resumed = loadSession();
if(resumed){ loginAs(resumed); }

</script>
</body>
</html>
