<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#05060d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AutoRest">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<title>AutoRest - Gestion de Mesas</title>
<style>
:root{
--bg-a:#05060d;
--bg-b:#0d1230;
--panel:rgba(19,23,46,0.72);
--border:rgba(124,58,237,0.35);
--border-soft:rgba(148,163,255,0.18);
--accent:#8b5cf6;
--accent2:#22d3ee;
--accent-grad:linear-gradient(135deg,var(--accent),var(--accent2));
--free:#2dffb0;
--occupied:#ffb347;
--dirty:#9ca3c4;
--danger:#ff3d6e;
--text:#e8ecfb;
--muted:#8993b8;
--radius:16px;
--shadow:0 10px 30px rgba(0,0,0,0.45);
--glow-accent:0 0 18px rgba(139,92,246,0.55);
--glow-cyan:0 0 18px rgba(34,211,238,0.5);
--glow-danger:0 0 20px rgba(255,61,110,0.8);
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;
background:
radial-gradient(circle at 15% 10%, rgba(139,92,246,0.18), transparent 40%),
radial-gradient(circle at 85% 15%, rgba(34,211,238,0.15), transparent 45%),
linear-gradient(180deg,var(--bg-a),var(--bg-b));
background-attachment:fixed;
color:var(--text); min-height:100vh;}
header{
background:rgba(10,12,26,0.75);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
padding:14px 22px;
display:flex;align-items:center;gap:18px;flex-wrap:wrap;
border-bottom:1px solid var(--border-soft);
box-shadow:0 4px 24px rgba(0,0,0,0.5);
position:relative;z-index:20;
}
header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--accent-grad);opacity:.7;}
header h1{
font-size:21px;margin:0;margin-right:4px;font-weight:800;letter-spacing:.5px;
background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;
text-shadow:0 0 24px rgba(139,92,246,0.35);
}
.live-indicator{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);background:rgba(255,255,255,0.04);padding:6px 12px;border-radius:20px;border:1px solid var(--border-soft);transition:all .2s;}
.live-indicator.alert{background:rgba(255,61,110,0.15);border-color:rgba(255,61,110,0.5);color:#ffd7e1;animation:alertPulse 1.4s infinite;}
@keyframes alertPulse{0%{box-shadow:0 0 0 0 rgba(255,61,110,0.5);}70%{box-shadow:0 0 0 10px rgba(255,61,110,0);}100%{box-shadow:0 0 0 0 rgba(255,61,110,0);}}
.live-dot{width:9px;height:9px;border-radius:50%;background:#64748b;transition:background .3s, box-shadow .3s;}
.live-dot.on{background:var(--free);box-shadow:0 0 10px 2px rgba(45,255,176,0.8);animation:pulseDot 1.6s infinite;}
.live-dot.off{background:var(--danger);box-shadow:0 0 10px 2px rgba(255,61,110,0.7);}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(45,255,176,0.6);}70%{box-shadow:0 0 0 8px rgba(45,255,176,0);}100%{box-shadow:0 0 0 0 rgba(45,255,176,0);}}
.floors{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.floor-tab{position:relative;padding:8px 14px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid var(--border-soft);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;color:#c7cdea;transition:all .18s;}
.floor-tab:hover{background:rgba(139,92,246,0.18);border-color:var(--accent);}
.floor-tab.active{background:var(--accent-grad);color:#0a0c1a;box-shadow:var(--glow-accent);font-weight:700;border-color:transparent;}
.floor-tab .mini-btn{opacity:.65;font-size:11px;padding:2px 6px;border-radius:6px;}
.floor-tab .mini-btn:hover{opacity:1;background:rgba(0,0,0,0.15);}
.floor-tab.active .mini-btn:hover{background:rgba(0,0,0,0.2);}
.add-floor-btn{padding:8px 14px;border-radius:20px;border:1.5px dashed rgba(139,92,246,0.5);background:transparent;cursor:pointer;color:#c7cdea;font-size:13px;transition:all .18s;}
.add-floor-btn:hover{background:rgba(139,92,246,0.12);border-color:var(--accent2);color:#fff;}
#canvas-wrap{position:relative;height:calc(100vh - 132px);overflow:auto;background-image:radial-gradient(circle,rgba(139,92,246,0.18) 1px,transparent 1.4px);background-size:28px 28px;}
#canvas{position:relative;min-width:100%;min-height:100%;}
.empty-hint{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:var(--muted);font-size:14px;text-align:center;pointer-events:none;width:80%;line-height:1.6;}
.table-el{position:absolute;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;user-select:none;touch-action:none;cursor:pointer;text-align:center;padding:4px;letter-spacing:.2px;
border:2px solid rgba(255,255,255,0.35);
box-shadow:0 8px 22px rgba(0,0,0,0.45), var(--glow-accent);
transition:box-shadow .2s, transform .15s;
}
.table-el:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,0.5), var(--glow-cyan);}
.table-el.square{border-radius:14px;}
.table-el.circle{border-radius:50%;}
.table-el .status-dot{position:absolute;bottom:-4px;left:-4px;width:15px;height:15px;border-radius:50%;border:2px solid rgba(10,12,26,0.9);}
.table-el .bell{position:absolute;top:-12px;right:-12px;width:26px;height:26px;border-radius:50%;background:rgba(17,20,40,0.9);border:2px solid var(--border-soft);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:#93a0c9;box-shadow:0 2px 8px rgba(0,0,0,0.4);transition:all .2s;}
.table-el .bell:hover{border-color:var(--accent2);color:#fff;}
.table-el .bell.active{background:var(--danger);color:#fff;border-color:var(--danger);box-shadow:var(--glow-danger);}
.table-el.blink{animation:blinkAnim 1.1s infinite;}
@keyframes blinkAnim{
0%{box-shadow:0 0 0 0 rgba(255,61,110,0.7), var(--glow-accent);}
50%{box-shadow:0 0 0 18px rgba(255,61,110,0), var(--glow-accent);}
100%{box-shadow:0 0 0 0 rgba(255,61,110,0), var(--glow-accent);}
}
#buildBar{position:fixed;left:0;right:0;bottom:0;background:rgba(10,12,26,0.85);backdrop-filter:blur(14px);border-top:1px solid var(--border-soft);z-index:50;box-shadow:0 -8px 26px rgba(0,0,0,0.5);}
#buildBar::before{content:"";position:absolute;left:0;right:0;top:-1px;height:1px;background:var(--accent-grad);opacity:.7;}
#buildToggle{position:absolute;right:20px;top:-52px;background:var(--accent-grad);color:#0a0c1a;border:none;border-radius:50%;width:52px;height:52px;cursor:pointer;font-size:20px;box-shadow:var(--glow-accent);}
#buildToggle:hover{filter:brightness(1.1);}
#buildPanel{display:none;padding:14px 20px;gap:14px;flex-wrap:wrap;align-items:center;}
#buildPanel.open{display:flex;}
.switch-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.switch{position:relative;display:inline-block;width:40px;height:22px;}
.switch input{opacity:0;width:0;height:0;}
.switch-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#2b2f4a;border-radius:22px;transition:.2s;border:1px solid var(--border-soft);}
.switch-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.switch input:checked + .switch-slider{background:var(--accent-grad);box-shadow:var(--glow-accent);}
.switch input:checked + .switch-slider:before{transform:translateX(18px);}
.btn{padding:9px 14px;border-radius:10px;border:1px solid var(--border-soft);background:rgba(255,255,255,0.04);cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;}
.btn:hover{background:rgba(139,92,246,0.16);border-color:var(--accent);}
.btn:active{transform:scale(0.97);}
.btn.primary{background:var(--accent-grad);color:#0a0c1a;border-color:transparent;font-weight:700;box-shadow:var(--glow-accent);}
.btn.primary:hover{filter:brightness(1.1);}
.btn.primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;}
.btn.danger{background:rgba(255,61,110,0.08);color:var(--danger);border-color:rgba(255,61,110,0.4);}
.btn.danger:hover{background:rgba(255,61,110,0.18);box-shadow:var(--glow-danger);}
.hint-bar{font-size:12px;color:var(--muted);}
.modal-overlay{position:fixed;inset:0;background:rgba(2,3,10,0.68);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:linear-gradient(180deg, rgba(24,27,52,0.98), rgba(14,16,34,0.98));border:1px solid var(--border-soft);border-radius:18px;width:380px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:20px;box-shadow:0 24px 60px rgba(0,0,0,0.6), var(--glow-accent);color:var(--text);}
.modal h2{margin-top:0;font-size:17px;display:flex;justify-content:space-between;align-items:center;color:var(--text);}
.modal .close-x{cursor:pointer;color:var(--muted);font-size:16px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);}
.modal .close-x:hover{background:rgba(255,255,255,0.14);color:#fff;}
.modal p{font-size:14px;color:var(--text);line-height:1.5;}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.form-row input[type=text], .form-row input[type=number], .form-row select{width:100%;padding:8px 10px;border:1px solid var(--border-soft);border-radius:8px;font-size:13px;background:rgba(255,255,255,0.04);color:var(--text);}
.form-row select option, select option{background:#161a2e;color:#e8ecfb;}
.form-row input:focus, .form-row select:focus{outline:2px solid var(--accent2);outline-offset:1px;}
.color-presets{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.color-presets span{display:inline-block;width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.25);transition:transform .15s;}
.color-presets span:hover{transform:scale(1.15);border-color:#fff;}
.item-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px;}
.item-row .name{flex:1;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border-soft);background:rgba(255,255,255,0.05);cursor:pointer;font-weight:700;color:var(--text);}
.qty-btn:hover{background:rgba(139,92,246,0.2);}
.totals{margin-top:12px;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px;font-size:13px;border:1px solid var(--border-soft);}
.totals .row{display:flex;justify-content:space-between;margin-bottom:6px;color:var(--muted);}
.totals .grand{font-weight:700;font-size:16px;color:#fff;border-top:1px solid var(--border-soft);padding-top:8px;margin-top:4px;}
.assist-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,179,71,0.1);border:1px solid rgba(255,179,71,0.35);padding:10px 12px;border-radius:10px;margin-bottom:12px;font-size:13px;gap:10px;}

.login-screen{position:fixed;inset:0;background:
radial-gradient(circle at 15% 10%, rgba(139,92,246,0.18), transparent 40%),
radial-gradient(circle at 85% 15%, rgba(34,211,238,0.15), transparent 45%),
linear-gradient(180deg,var(--bg-a),var(--bg-b));
display:flex;align-items:center;justify-content:center;z-index:300;}
.login-box{background:var(--panel);border:1px solid var(--border-soft);border-radius:20px;padding:28px 26px;width:320px;max-width:90vw;text-align:center;box-shadow:var(--shadow);}
.login-box h1{background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0 0 6px;font-size:24px;}
.login-box p{color:var(--muted);font-size:13px;margin:0 0 18px;}
.login-box .form-row{text-align:left;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:18px;}
.pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--border-soft);background:transparent;transition:all .15s;display:inline-block;}
.pin-dots span.filled{background:var(--accent-grad);border-color:transparent;box-shadow:var(--glow-accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-pad button{padding:14px 0;border-radius:12px;border:1px solid var(--border-soft);background:rgba(255,255,255,0.04);color:var(--text);font-size:18px;cursor:pointer;}
.pin-pad button:hover{background:rgba(139,92,246,0.18);border-color:var(--accent);}
.pin-pad button.wide{font-size:13px;color:var(--muted);}
.login-error{color:var(--danger);font-size:12px;min-height:16px;margin-bottom:8px;}
.role-badge{font-size:10px;padding:2px 8px;border-radius:10px;text-transform:uppercase;font-weight:700;letter-spacing:.4px;white-space:nowrap;}
.role-badge.admin{background:rgba(139,92,246,0.25);color:#c9b6ff;}
.role-badge.mesero{background:rgba(34,211,238,0.2);color:#8fe9fb;}
.role-badge.cocina{background:rgba(255,179,71,0.2);color:#ffcf94;}
.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);background:rgba(255,255,255,0.04);padding:6px 10px;border-radius:20px;border:1px solid var(--border-soft);margin-left:auto;}
.user-chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;text-decoration:underline;padding:0;}
.user-chip button:hover{color:#fff;}
.assign-tag{position:absolute;top:-10px;left:-10px;background:rgba(10,12,26,0.9);border:1px solid var(--border-soft);border-radius:10px;padding:2px 6px;font-size:10px;color:#c7cdea;max-width:74px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.table-el.dirty{opacity:.6;filter:grayscale(.5);}
.clean-tag{position:absolute;bottom:-10px;right:-10px;background:rgba(10,12,26,0.9);border:1px solid var(--border-soft);border-radius:10px;padding:2px 6px;font-size:10px;color:#c7cdea;white-space:nowrap;}
#kitchenView{padding:18px;display:none;flex-wrap:wrap;gap:14px;align-content:flex-start;height:calc(100vh - 132px);overflow-y:auto;}
.kview-card{background:var(--panel);border:1px solid var(--border-soft);border-radius:14px;padding:14px;width:260px;box-shadow:var(--shadow);height:fit-content;}
.kview-card h3{margin:0 0 4px;font-size:15px;}
.kview-card .kmeta{font-size:11px;color:var(--muted);margin-bottom:10px;}
.kview-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px;gap:8px;}
.kview-item.ready{opacity:.5;}
.kview-item button{padding:4px 10px;border-radius:8px;border:1px solid var(--border-soft);background:rgba(255,255,255,0.05);color:var(--text);font-size:11px;cursor:pointer;white-space:nowrap;}
.kview-item button:hover{background:rgba(34,211,238,0.2);border-color:var(--accent2);}
.kview-empty{color:var(--muted);font-size:14px;text-align:center;margin-top:60px;width:100%;}
.mini-color-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px;}
.mini-color-row span{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.25);display:inline-block;}
.mini-color-row span:hover{border-color:#fff;transform:scale(1.1);}
.readonly-note{background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);padding:8px 12px;border-radius:10px;font-size:12px;color:#c9b6ff;margin-bottom:12px;}
.cat-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.cat-filter-btn{padding:6px 12px;border-radius:16px;border:1px solid var(--border-soft);background:rgba(255,255,255,0.04);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;}
.cat-filter-btn:hover{background:rgba(139,92,246,0.15);color:#fff;}
.cat-filter-btn.active{background:var(--accent-grad);color:#0a0c1a;font-weight:700;border-color:transparent;}
.cat-tiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-bottom:14px;}
.cat-tile{background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.cat-tile:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--glow-accent);}
.cat-tile .cat-icon{font-size:24px;margin-bottom:6px;height:44px;display:flex;align-items:center;justify-content:center;}
.cat-tile .cat-icon img{width:100%;height:44px;object-fit:cover;border-radius:8px;}
.cat-tile .cat-name{font-size:12px;font-weight:700;}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px;max-height:280px;overflow-y:auto;padding:2px;margin-bottom:14px;}
.catalog-card{background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;}
.catalog-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--glow-accent);}
.catalog-card .thumb{width:100%;height:68px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--muted);}
.catalog-card .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.catalog-card .info{padding:6px 8px;}
.catalog-card .info .pname{font-size:11px;font-weight:600;line-height:1.25;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.catalog-card .info .pprice{font-size:11px;color:var(--accent2);font-weight:700;}
.catalog-empty{grid-column:1/-1;font-size:12px;color:var(--muted);text-align:center;padding:16px 0;}
.img-upload-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.img-preview{width:56px;height:56px;border-radius:10px;object-fit:cover;background:rgba(255,255,255,0.05);border:1px solid var(--border-soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted);overflow:hidden;}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-upload-row input[type=file]{flex:1;font-size:11px;color:var(--muted);}
.cat-tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.cat-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);border-radius:16px;padding:4px 6px 4px 12px;font-size:12px;cursor:pointer;}
.cat-chip:hover{border-color:var(--accent);}
.cat-chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;line-height:1;}
.cat-chip button:hover{color:#fff;}
.menu-item-row-admin{display:flex;align-items:center;gap:10px;}
.thumb-sm{width:38px;height:38px;border-radius:8px;object-fit:cover;background:rgba(255,255,255,0.05);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);overflow:hidden;}
.thumb-sm img{width:100%;height:100%;object-fit:cover;}
.kview-item .elapsed{color:var(--muted);}
.kview-item.late{background:rgba(255,61,110,0.1);border-radius:6px;padding-left:6px;}
.kview-item.late .elapsed{color:var(--danger);font-weight:700;}
.catalog-card.out{opacity:.45;filter:grayscale(.6);}
.stock-btn{font-size:13px;}
.cat-tile:focus-visible, .catalog-card:focus-visible, .table-el:focus-visible{outline:2px solid var(--accent2);outline-offset:2px;}
.report-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.report-stat{background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);border-radius:10px;padding:10px 14px;min-width:104px;}
.report-stat b{display:block;font-size:19px;}
.report-stat span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.report-list{margin-bottom:16px;}
.report-list h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;}
.report-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.report-empty{font-size:12px;color:var(--muted);}
.log-list{max-height:220px;overflow-y:auto;border:1px solid var(--border-soft);border-radius:10px;padding:8px 12px;}
.log-row{display:flex;flex-wrap:wrap;gap:6px;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);}

<body>
<div id="loginScreen" class="login-screen" style="display:none;"></div>

<header>
<h1 id="brandTitle">AutoRest</h1>

<div class="floors" id="floorsContainer"></div>

<span class="switch">

<span class="switch-slider"></span>
</span>
Modo edicion (mover / crear)
</label>

<button class="btn" id="addSquareBtn">&#9635; Mesa cuadrada</button>
<button class="btn" id="addSignBtn">&#127991; Cartel</button>
<button class="btn" id="menuBtn">&#127860; Gestionar menu</button>
<button class="btn" id="usersBtn">&#128101; Gestionar usuarios</button>
<button class="btn" id="reportsBtn">&#128202; Reportes</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>

const STORAGE_KEY = 'autorest_state_v1';
function defaultState(){
return {
floors: [
{id:'f1', name:'Piso 1', tables:[]}
],
activeFloor: 'f1',
menu: [],
categories: defaultCategories(),
users: [],
settings: defaultSettings(),
sales: []
};
}
function defaultCategories(){
return [
{id: uid('c'), name: 'Comida'},
{id: uid('c'), name: 'Bebidas'},
{id: uid('c'), name: 'Postres'}
];
}
function defaultSettings(){
return { name: 'AutoRest', accentColor: '#8b5cf6', taxPercent: 0 };
}
function normalizeMenu(obj){
if(!Array.isArray(obj.categories) || obj.categories.length === 0){
obj.categories = defaultCategories();
}
if(!Array.isArray(obj.menu)) obj.menu = [];
obj.menu.forEach(function(p){
if(typeof p.categoryId === 'undefined') p.categoryId = null;
if(typeof p.image !== 'string') p.image = '';
if(typeof p.outOfStock !== 'boolean') p.outOfStock = false;
});
if(!obj.settings || typeof obj.settings !== 'object') obj.settings = defaultSettings();
if(!obj.settings.name) obj.settings.name = 'AutoRest';
if(!obj.settings.accentColor) obj.settings.accentColor = '#8b5cf6';
if(typeof obj.settings.taxPercent !== 'number' || isNaN(obj.settings.taxPercent)) obj.settings.taxPercent = 0;
if(!Array.isArray(obj.sales)) obj.sales = [];
if(!Array.isArray(obj.activityLog)) obj.activityLog = [];
}
function loadLocalState(){
try{
const raw = localStorage.getItem(STORAGE_KEY);
if(raw){
const parsed = JSON.parse(raw);
if(!Array.isArray(parsed.users)) parsed.users = [];
normalizeMenu(parsed);
if(!Array.isArray(parsed.floors) || parsed.floors.length === 0) parsed.floors = defaultState().floors;
normalizeFloors(parsed.floors);
if(!parsed.activeFloor) parsed.activeFloor = parsed.floors[0].id;
return parsed;
}
}catch(e){}
return defaultState();
}
function normalizeFloors(floors){
floors.forEach(function(f){
if(!Array.isArray(f.tables)) f.tables = [];
if(!Array.isArray(f.signs)) f.signs = [];
f.tables.forEach(function(t){
if(!Array.isArray(t.items)) t.items = [];
t.items.forEach(function(i){
if(typeof i.ready !== 'boolean') i.ready = false;
if(typeof i.addedAt !== 'number') i.addedAt = Date.now();
});
if(typeof t.assignedTo === 'undefined') t.assignedTo = null;
if(typeof t.dirty !== 'boolean') t.dirty = false;
});
});
return floors;
}
let state = loadLocalState();
function uid(prefix){
return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

/* ---------- Sesion / roles ---------- */
let currentUser = null;
let editMode = false;
let viewMode = 'floor';
let pinBuffer = '';
let lastLoginHadUsers = null;
const SESSION_KEY = 'autorest_session_v1';

function isAdmin(){ return !!currentUser && currentUser.role === 'admin'; }
function isMesero(){ return !!currentUser && currentUser.role === 'mesero'; }
function isCocina(){ return !!currentUser && currentUser.role === 'cocina'; }
function canOperateTable(table){
if(isAdmin()) return true;
if(isMesero()) return table.assignedTo === currentUser.id;
return false;
}
function roleLabel(r){
return r === 'admin' ? 'Admin' : (r === 'mesero' ? 'Mesero' : 'Cocina');
}
function findUserByPin(pin){
return (state.users || []).find(function(u){ return u.pin === pin; });
}
function loadSession(){
try{
const raw = sessionStorage.getItem(SESSION_KEY);
if(raw){
const id = JSON.parse(raw);
const u = (state.users || []).find(function(x){ return x.id === id; });
if(u) return u;
}
}catch(e){}
return null;
}
function saveSession(user){
try{ sessionStorage.setItem(SESSION_KEY, JSON.stringify(user ? user.id : null)); }catch(e){}
}
function logout(){
currentUser = null;
saveSession(null);
pinBuffer = '';
document.getElementById('appRoot').style.display = 'none';
document.getElementById('loginScreen').style.display = 'flex';
lastLoginHadUsers = state.users && state.users.length > 0;
renderLoginScreen();
}
function loginAs(user){
currentUser = user;
saveSession(user);
document.getElementById('loginScreen').style.display = 'none';
document.getElementById('appRoot').style.display = 'block';
applyBranding();
applyRoleUI();
renderFloors();
renderCanvas();
renderKitchenView();
}
function updatePinDots(){
const dots = document.querySelectorAll('#pinDots span');
dots.forEach(function(d, i){ d.className = i < pinBuffer.length ? 'filled' : ''; });
}
function attemptLogin(){
const u = findUserByPin(pinBuffer);
const err = document.getElementById('loginErr');
if(!u){
if(err) err.textContent = 'PIN incorrecto.';
pinBuffer = '';
updatePinDots();
return;
}
loginAs(u);
}
function renderLoginScreen(){
applyBranding();
const el = document.getElementById('loginScreen');
const brandName = escapeHtml((state.settings && state.settings.name) || 'AutoRest');
const hasUsers = state.users && state.users.length > 0;
if(!hasUsers){
el.innerHTML =
'<div class="login-box">' +
'<h1>' + brandName + '</h1>' +
'<p>Primer uso: crea el PIN del administrador</p>' +
'<div class="login-error" id="loginErr"></div>' +
'<div class="form-row"><label>Tu nombre</label><input type="text" id="setupName" placeholder="Administrador"></div>' +
'<div class="form-row"><label>PIN (4 digitos)</label><input type="text" id="setupPin" maxlength="4" inputmode="numeric" placeholder="0000"></div>' +
'<div class="form-row"><label>Confirmar PIN</label><input type="text" id="setupPin2" maxlength="4" inputmode="numeric" placeholder="0000"></div>' +
'<button class="btn primary" id="setupOk" style="width:100%;">Crear administrador</button>' +
'</div>';
document.getElementById('setupOk').onclick = function(){
const name = document.getElementById('setupName').value.trim() || 'Administrador';
const pin = document.getElementById('setupPin').value.trim();
const pin2 = document.getElementById('setupPin2').value.trim();
const err = document.getElementById('loginErr');
if(!/^\d{4}$/.test(pin)){ err.textContent = 'El PIN debe tener 4 digitos.'; return; }
if(pin !== pin2){ err.textContent = 'Los PIN no coinciden.'; return; }
const admin = {id: uid('u'), name: name, role: 'admin', pin: pin};
if(!Array.isArray(state.users)) state.users = [];
state.users.push(admin);
saveState();
loginAs(admin);
openSetupWizard();
};
return;
}
el.innerHTML =
'<div class="login-box">' +
'<h1>' + brandName + '</h1>' +
'<p>Ingresa tu PIN</p>' +
'<div class="pin-dots" id="pinDots"><span></span><span></span><span></span><span></span></div>' +
'<div class="login-error" id="loginErr"></div>' +
'<div class="pin-pad" id="pinPad"></div>' +
'</div>';
pinBuffer = '';
const pad = document.getElementById('pinPad');
['1','2','3','4','5','6','7','8','9','','0','del'].forEach(function(k){
const b = document.createElement('button');
if(k === ''){ b.style.visibility = 'hidden'; }
else if(k === 'del'){ b.textContent = '⌫'; b.className = 'wide'; }
else{ b.textContent = k; }
b.onclick = function(){
if(k === 'del'){ pinBuffer = pinBuffer.slice(0, -1); }
else if(k !== ''){ if(pinBuffer.length < 4) pinBuffer += k; }
const err = document.getElementById('loginErr');
if(err) err.textContent = '';
updatePinDots();
if(pinBuffer.length === 4) attemptLogin();
};
pad.appendChild(b);
});
updatePinDots();
}
function applyRoleUI(){
const buildBar = document.getElementById('buildBar');
const addFloorBtn = document.getElementById('addFloorBtn');
const kitchenBtn = document.getElementById('kitchenToggleBtn');
const chip = document.getElementById('userChip');
chip.style.display = 'flex';
chip.innerHTML = escapeHtml(currentUser.name) + ' <span class="role-badge ' + currentUser.role + '">' + roleLabel(currentUser.role) + '</span> <button id="logoutBtn">Salir</button>';
document.getElementById('logoutBtn').onclick = logout;

if(isAdmin()){
buildBar.style.display = 'block';
addFloorBtn.style.display = 'inline-block';
kitchenBtn.style.display = 'inline-block';
kitchenBtn.textContent = '🍳 Cocina';
setViewMode('floor');
}else if(isCocina()){
buildBar.style.display = 'none';
addFloorBtn.style.display = 'none';
kitchenBtn.style.display = 'none';
setViewMode('kitchen');
}else{
buildBar.style.display = 'none';
addFloorBtn.style.display = 'none';
kitchenBtn.style.display = 'none';
setViewMode('floor');
}
}
function setViewMode(mode){
viewMode = mode;
document.getElementById('canvas').style.display = mode === 'floor' ? 'block' : 'none';
document.getElementById('kitchenView').style.display = mode === 'kitchen' ? 'flex' : 'none';
document.getElementById('floorsContainer').style.display = mode === 'floor' ? 'flex' : 'none';
if(mode === 'kitchen') renderKitchenView();
}

/* ---------- Firebase realtime sync (en vivo para todos) ---------- */
const firebaseConfig = {
apiKey: "AIzaSyDbnKHITdFm_K4lCXPhb42wZl312-Q-ino",
authDomain: "autorest-7b989.firebaseapp.com",
databaseURL: "https://autorest-7b989-default-rtdb.firebaseio.com",
projectId: "autorest-7b989",
storageBucket: "autorest-7b989.firebasestorage.app",
messagingSenderId: "476651193663",
appId: "1:476651193663:web:f0483945f1456a5513ff8a",
measurementId: "G-TQ0QHP8Z9K"
};
let dbRef = null;
let firebaseBootstrapped = false;
let pendingRemoteState = null;

let connectionStatus = 'connecting';
function setLive(status){
connectionStatus = status;
refreshLiveIndicator();
}
function getTablesNeedingAssistance(){
const list = [];
(state.floors || []).forEach(function(floor){
floor.tables.forEach(function(table){
if(table.assistance){ list.push(table); }
});
});
return list;
}
function refreshLiveIndicator(){
var dot = document.getElementById('liveDot');
var text = document.getElementById('liveText');
var wrap = document.getElementById('liveIndicator');
if(!dot || !text || !wrap) return;
const needing = getTablesNeedingAssistance();
if(needing.length > 0){
dot.className = 'live-dot off';
wrap.classList.add('alert');
const names = needing.map(function(t){ return t.label; }).join(', ');
text.textContent = '🔔 ' + (needing.length === 1 ? 'Mesa ' + names + ' solicita asistencia' : 'Mesas ' + names + ' solicitan asistencia');
return;
}
wrap.classList.remove('alert');
if(connectionStatus === 'on'){ dot.className = 'live-dot on'; text.textContent = 'En vivo - todos sincronizados'; }
else if(connectionStatus === 'off'){ dot.className = 'live-dot off'; text.textContent = 'Sin conexion'; }
else { dot.className = 'live-dot'; text.textContent = 'Conectando...'; }
}
function isAnyModalOpen(){
return !!document.querySelector('.modal-overlay');
}
function applyRemoteState(val){
if(!val || typeof val !== 'object') return;
if(!Array.isArray(val.users)) val.users = [];
normalizeMenu(val);
if(!Array.isArray(val.floors) || val.floors.length === 0) val.floors = defaultState().floors;
normalizeFloors(val.floors);
if(!val.activeFloor) val.activeFloor = val.floors[0].id;
state = val;
try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
if(currentUser){
const stillExists = state.users.find(function(u){ return u.id === currentUser.id; });
if(!stillExists){ logout(); return; }
currentUser = stillExists;
applyBranding();
renderFloors();
renderCanvas();
renderKitchenView();
}else{
const hasUsersNow = state.users && state.users.length > 0;
if(hasUsersNow !== lastLoginHadUsers){
lastLoginHadUsers = hasUsersNow;
renderLoginScreen();
}
}
}
const modalObserver = new MutationObserver(function(){
if(!isAnyModalOpen() && pendingRemoteState){
var v = pendingRemoteState;
pendingRemoteState = null;
applyRemoteState(v);
}
});
function initFirebase(){
try{
firebase.initializeApp(firebaseConfig);
dbRef = firebase.database().ref('autorestState');
modalObserver.observe(document.body, {childList:true});
firebase.database().ref('.info/connected').on('value', function(snap){
setLive(snap.val() === true ? 'on' : 'off');
});
dbRef.on('value', function(snapshot){
var val = snapshot.val();
if(val === null){
if(!firebaseBootstrapped){
firebaseBootstrapped = true;
dbRef.set(state).catch(function(e){ console.error('Firebase set error', e); });
}
return;
}
firebaseBootstrapped = true;
if(isAnyModalOpen()){ pendingRemoteState = val; }
else{ applyRemoteState(val); }
}, function(error){
console.error('Firebase read error', error);
setLive('off');
});
}catch(e){
console.error('No se pudo inicializar Firebase', e);
setLive('off');
}
}
function saveState(){
try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
if(dbRef){ dbRef.set(state).catch(function(e){ console.error('Firebase set error', e); }); }
}

function getActiveFloor(){
return state.floors.find(function(f){ return f.id === state.activeFloor; }) || state.floors[0];
}
function escapeHtml(str){
return String(str).replace(/[&<>"']/g, function(m){
if(m === '&') return '&amp;';
if(m === '<') return '&lt;';
if(m === '>') return '&gt;';
if(m === '"') return '&quot;';
return '&#39;';
});
}
function applyBranding(){
const s = state.settings || defaultSettings();
document.documentElement.style.setProperty('--accent', s.accentColor);
const brandTitle = document.getElementById('brandTitle');
if(brandTitle) brandTitle.textContent = s.name;
document.title = s.name + ' - Gestion de Mesas';
}
function wireModal(overlay){
overlay.setAttribute('role', 'dialog');
overlay.setAttribute('aria-modal', 'true');
const focusables = overlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
if(focusables.length === 0) return;
const first = focusables[0];
const last = focusables[focusables.length - 1];
overlay.addEventListener('keydown', function(e){
if(e.key !== 'Tab') return;
if(e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
else if(!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
});
first.focus();
}
document.addEventListener('keydown', function(e){
if(e.key !== 'Escape') return;
const overlays = document.querySelectorAll('.modal-overlay');
if(overlays.length === 0) return;
overlays[overlays.length - 1].remove();
renderCanvas();
renderKitchenView();
});
let audioCtx = null;
function playBeep(){
try{
if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
const o = audioCtx.createOscillator();
const g = audioCtx.createGain();
o.type = 'sine';
o.frequency.value = 880;
g.gain.value = 0.15;
o.connect(g);
g.connect(audioCtx.destination);
o.start();
g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
o.stop(audioCtx.currentTime + 0.4);
}catch(e){}
}
function logActivity(action, floor, table){
if(!Array.isArray(state.activityLog)) state.activityLog = [];
state.activityLog.push({
id: uid('log'),
ts: Date.now(),
userId: currentUser ? currentUser.id : null,
userName: currentUser ? currentUser.name : 'Sistema',
role: currentUser ? currentUser.role : '',
action: action,
floorName: floor ? floor.name : '',
tableLabel: table ? table.label : ''
});
if(state.activityLog.length > 500){ state.activityLog = state.activityLog.slice(state.activityLog.length - 500); }
}
function resizeImageToDataUrl(file, callback){
const reader = new FileReader();
reader.onload = function(e){
const img = new Image();
img.onload = function(){
const maxDim = 240;
let w = img.width, h = img.height;
if(w > h){ if(w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; } }
else{ if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; } }
const canvas = document.createElement('canvas');
canvas.width = w; canvas.height = h;
canvas.getContext('2d').drawImage(img, 0, 0, w, h);
callback(canvas.toDataURL('image/jpeg', 0.72));
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}
function showPrompt(title, defaultValue, onOk){
const overlay = document.createElement('div');
overlay.className = 'modal-overlay';
overlay.innerHTML =
'<div class="modal" style="width:300px;">' +
'<h2>' + escapeHtml(title) + '</h2>' +
'<div class="form-row"><input type="text" id="promptInput" value="' + escapeHtml(defaultValue || '') + '"></div>' +
'<div style="display:flex;gap:8px;justify-content:flex-end;">' +
'<button class="btn" id="promptCancel">Cancelar</button>' +
'<button class="btn primary" id="promptOk">Aceptar</button>' +
'</div>' +
'</div>';
document.body.appendChild(overlay);
wireModal(overlay);
const input = overlay.querySelector('#promptInput');
setTimeout(function(){ input.focus(); input.select(); }, 0);
function ok(){ const v = input.value; overlay.remove(); onOk(v); }
overlay.querySelector('#promptCancel').onclick = function(){ overlay.remove(); };
overlay.querySelector('#promptOk').onclick = ok;
input.addEventListener('keydown', function(e){
if(e.key === 'Enter'){ e.preventDefault(); ok(); }
if(e.key === 'Escape'){ overlay.remove(); }
});
}
function showConfirm(message, onYes){
const overlay = document.createElement('div');
overlay.className = 'modal-overlay';
overlay.innerHTML =
'<div class="modal" style="width:320px;">' +
'<p>' + escapeHtml(message) + '</p>' +
'<div style="display:flex;gap:8px;justify-content:flex-end;">' +
'<button class="btn" id="confirmNo">Cancelar</button>' +
'<button class="btn danger" id="confirmYes">Confirmar</button>' +
'</div>' +
'</div>';
document.body.appendChild(overlay);
wireModal(overlay);
overlay.querySelector('#confirmNo').onclick = function(){ overlay.remove(); };
overlay.querySelector('#confirmYes').onclick = function(){ overlay.remove(); onYes(); };
}
function showAlert(message){
const overlay = document.createElement('div');
overlay.className = 'modal-overlay';
overlay.innerHTML =
'<div class="modal" style="width:300px;">' +
'<p>' + escapeHtml(message) + '</p>' +
'<div style="display:flex;justify-content:flex-end;">' +
'<button class="btn primary" id="alertOk">OK</button>' +
'</div>' +
'</div>';
document.body.appendChild(overlay);
wireModal(overlay);
overlay.querySelector('#alertOk').onclick = function(){ overlay.remove(); };
}

const floorsContainer = document.getElementById('floorsContainer');
function renderFloors(){
floorsContainer.innerHTML = '';
state.floors.forEach(function(floor){
const tab = document.createElement('div');
tab.className = 'floor-tab' + (floor.id === state.activeFloor ? ' active' : '');
const nameSpan = document.createElement('span');
nameSpan.textContent = floor.name;
nameSpan.onclick = function(){ state.activeFloor = floor.id; saveState(); renderFloors(); renderCanvas(); };
tab.appendChild(nameSpan);

if(isAdmin()){
const editBtn = document.createElement('span');
editBtn.className = 'mini-btn';
editBtn.textContent = 'Ren';
editBtn.title = 'Renombrar piso';
editBtn.onclick = function(e){
e.stopPropagation();
showPrompt('Nuevo nombre del piso', floor.name, function(nn){
if(nn && nn.trim()){ floor.name = nn.trim(); saveState(); renderFloors(); }
});
};
tab.appendChild(editBtn);

const delBtn = document.createElement('span');
delBtn.className = 'mini-btn';
delBtn.textContent = 'Del';
delBtn.title = 'Eliminar piso';
delBtn.onclick = function(e){
e.stopPropagation();
if(state.floors.length <= 1){ showAlert('Debe existir al menos un piso.'); return; }
showConfirm('Eliminar el piso ' + floor.name + ' y todas sus mesas?', function(){
state.floors = state.floors.filter(function(f){ return f.id !== floor.id; });
if(state.activeFloor === floor.id) state.activeFloor = state.floors[0].id;

}

el.addEventListener('pointerdown', function(e){
if(!isAdmin() || !editMode) return;
if(e.pointerType === 'mouse' && e.button !== 0) return;
e.preventDefault();
const pointerId = e.pointerId;
const startX = e.clientX, startY = e.clientY;
const origX = table.x, origY = table.y;
dragged = false;
try{ el.setPointerCapture(pointerId); }catch(err){}
function onMove(ev){
if(ev.pointerId !== pointerId) return;
const dx = ev.clientX - startX, dy = ev.clientY - startY;
if(Math.abs(dx) > 3 || Math.abs(dy) > 3) dragged = true;
table.x = Math.max(0, origX + dx);
table.y = Math.max(0, origY + dy);
el.style.left = table.x + 'px';
el.style.top = table.y + 'px';
}
function onUp(ev){
if(ev.pointerId !== pointerId) return;
el.removeEventListener('pointermove', onMove);
el.removeEventListener('pointerup', onUp);
el.removeEventListener('pointercancel', onUp);
try{ el.releasePointerCapture(pointerId); }catch(err){}
if(dragged) saveState();
}
el.addEventListener('pointermove', onMove);
el.addEventListener('pointerup', onUp);
el.addEventListener('pointercancel', onUp);
});

canvas.appendChild(el);

function isSameLocalDay(ts, ref){
const a = new Date(ts);
return a.getFullYear() === ref.getFullYear() && a.getMonth() === ref.getMonth() && a.getDate() === ref.getDate();
}

function exportSalesCsv(){
const rows = [['Fecha', 'Piso', 'Mesa', 'Mesero', 'Producto', 'Cantidad', 'Precio unidad', 'Subtotal venta', 'Impuesto venta', 'Propina venta', 'Total venta']];
(state.sales || []).forEach(function(s){
const dateStr = new Date(s.closedAt).toLocaleString('es-ES');
s.items.forEach(function(i){
rows.push([dateStr, s.floorName, s.tableLabel, s.waiterName, i.name, i.qty, i.price.toFixed(2), s.subtotal.toFixed(2), s.tax.toFixed(2), s.tip.toFixed(2), s.total.toFixed(2)]);
});
});
const csv = rows.map(function(r){
return r.map(function(v){
const str = String(v).replace(/"/g, '""');
return /[",\n]/.test(str) ? '"' + str + '"' : str;
}).join(',');
}).join('\r\n');
const blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8;'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = 'ventas_' + (state.settings.name || 'autorest').replace(/\s+/g, '_') + '_' + new Date().toISOString().slice(0, 10) + '.csv';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
}

card.tabIndex = 0;
card.setAttribute('role', 'button');
const thumb = document.createElement('div');
thumb.className = 'thumb';
thumb.innerHTML = prod.image ? '<img src="' + prod.image + '">' : '🍽️';
card.appendChild(thumb);
const info = document.createElement('div');
info.className = 'info';
info.innerHTML = '<div class="pname">' + escapeHtml(prod.name) + (prod.outOfStock ? ' <span style="color:var(--danger);font-weight:400;">(agotado)</span>' : '') + '</div><div class="pprice">' + prod.price.toFixed(2) + '</div>';
card.appendChild(info);
card.onclick = function(){
if(prod.outOfStock){ showAlert('Este producto esta agotado por hoy.'); return; }
addProductToOrder(prod);
};
card.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); card.click(); } });
grid.appendChild(card);
});
}
function renderCatalogNav(){
const tilesWrap = overlay.querySelector('#catTilesGrid');
const productsWrap = overlay.querySelector('#productsView');
if(catalogView === 'categories'){
tilesWrap.style.display = 'grid';
productsWrap.style.display = 'none';
renderCatTiles();
}else{
tilesWrap.style.display = 'none';
productsWrap.style.display = 'block';
overlay.querySelector('#currentCatLabel').textContent = catalogFilter === 'none' ? 'Sin categoria' : categoryName(catalogFilter);
renderCatalogGrid();
}
}
overlay.querySelector('#backToCatsBtn').onclick = function(){ catalogView = 'categories'; renderCatalogNav(); };
renderCatalogNav();
function renderItems(){
const list = overlay.querySelector('#itemsList');
list.innerHTML = '';
if(table.items.length === 0){
list.innerHTML = '<div style="font-size:12px;color:#8993b8;padding:6px 0;">Sin productos aun.</div>';
}
table.items.forEach(function(item){
const row = document.createElement('div');
row.className = 'item-row';
const priceEach = item.price.toFixed(2);
const lineTotal = (item.price * item.qty).toFixed(2);
const readyBadge = item.ready ? '<span style="color:var(--accent2);font-size:11px;">&#10003; Listo</span>' : '<span style="color:var(--muted);font-size:11px;">&#8987; En cocina</span>';
row.innerHTML =
'<span class="name">' + escapeHtml(item.name) + '<br><small style="color:#8993b8;">precio unidad ' + priceEach + '</small></span>' +
readyBadge +
'<button class="qty-btn" data-act="minus">-</button>' +
'<span>' + item.qty + '</span>' +
'<button class="qty-btn" data-act="plus">+</button>' +
'<span>' + lineTotal + '</span>' +
'<button class="qty-btn" data-act="remove">&times;</button>';
row.querySelector('[data-act="plus"]').onclick = function(){ item.qty++; refresh(); };
row.querySelector('[data-act="minus"]').onclick = function(){ item.qty = Math.max(1, item.qty - 1); refresh(); };
row.querySelector('[data-act="remove"]').onclick = function(){ logActivity('Quito ' + item.name, floor, table); table.items = table.items.filter(function(i){ return i.id !== item.id; }); refresh(); };
list.appendChild(row);
});
}
function refresh(){
renderItems();
const subtotal = table.items.reduce(function(s, i){ return s + i.price * i.qty; }, 0);
const tipPercent = parseFloat(tipPercentInp.value) || 0;
table.tipPercent = tipPercent;
table.tipEnabled = tipEnabledChk.checked;
const tip = table.tipEnabled ? subtotal * (tipPercent / 100) : 0;
const taxPercent = (state.settings && state.settings.taxPercent) || 0;
const tax = subtotal * (taxPercent / 100);
overlay.querySelector('#subtotalVal').textContent = subtotal.toFixed(2);
overlay.querySelector('#taxLabelPct').textContent = taxPercent;
overlay.querySelector('#taxVal').textContent = tax.toFixed(2);
overlay.querySelector('#tipVal').textContent = tip.toFixed(2);
overlay.querySelector('#totalVal').textContent = (subtotal + tax + tip).toFixed(2);
renderCanvas();
renderKitchenView();
saveState();
}
tipEnabledChk.onchange = refresh;
tipPercentInp.oninput = refresh;
function doCharge(){
if(table.items.length > 0){
const subtotal = table.items.reduce(function(s, i){ return s + i.price * i.qty; }, 0);
const taxPercent = (state.settings && state.settings.taxPercent) || 0;
const tax = subtotal * (taxPercent / 100);
const tip = table.tipEnabled ? subtotal * (table.tipPercent / 100) : 0;
const waiter = (state.users || []).find(function(u){ return u.id === table.assignedTo; });
if(!Array.isArray(state.sales)) state.sales = [];
state.sales.push({
id: uid('s'),
floorId: floor.id,
floorName: floor.name,
tableLabel: table.label,
waiterId: table.assignedTo || null,
waiterName: waiter ? waiter.name : (currentUser ? currentUser.name : ''),
items: table.items.map(function(i){ return {name: i.name, price: i.price, qty: i.qty}; }),
subtotal: subtotal,
tax: tax,
tipPercent: table.tipEnabled ? table.tipPercent : 0,
tip: tip,
total: subtotal + tax + tip,
closedAt: Date.now()
});
logActivity('Cobro la mesa (total ' + (subtotal + tax + tip).toFixed(2) + ')', floor, table);
}else{
logActivity('Libero la mesa sin cobrar', floor, table);
}
table.items = [];
table.assistance = false;
table.assignedTo = null;
table.dirty = true;
saveState();
overlay.remove();
renderCanvas();
renderKitchenView();
}
overlay.querySelector('#printBtn').onclick = function(){
if(table.items.length === 0){ showAlert('Agrega productos antes de imprimir el recibo.'); return; }
printReceipt(table);
};
overlay.querySelector('#chargeBtn').onclick = function(){
if(table.items.length === 0){
showConfirm('La mesa no tiene productos. Deseas liberarla de todos modos?', doCharge);
} else {
showConfirm('Confirmar cobro y liberar la mesa?', doCharge);
}
};
refresh();
}

const KITCHEN_LATE_MINUTES = 10;
let knownKitchenItemIds = null;
function renderKitchenView(){
const el = document.getElementById('kitchenView');
if(!el) return;
el.innerHTML = '';
let any = false;
const currentIds = new Set();
let hasNew = false;
state.floors.forEach(function(floor){
floor.tables.forEach(function(table){
if(!table.items || table.items.length === 0) return;
if(table.items.every(function(i){ return i.ready; })) return;
any = true;
const assignedUser = (state.users || []).find(function(u){ return u.id === table.assignedTo; });
const card = document.createElement('div');
card.className = 'kview-card';
card.innerHTML = '<h3>' + escapeHtml(floor.name) + ' - Mesa ' + escapeHtml(table.label) + '</h3>' +
'<div class="kmeta">' + (assignedUser ? 'Mesero: ' + escapeHtml(assignedUser.name) : 'Sin mesero asignado') + '</div>';
const itemsWrap = document.createElement('div');
table.items.forEach(function(item){
currentIds.add(item.id);
if(!item.ready && knownKitchenItemIds && !knownKitchenItemIds.has(item.id)){ hasNew = true; }
const elapsedMin = Math.max(0, Math.floor((Date.now() - (item.addedAt || Date.now())) / 60000));
const late = !item.ready && elapsedMin >= KITCHEN_LATE_MINUTES;
const row = document.createElement('div');
row.className = 'kview-item' + (item.ready ? ' ready' : '') + (late ? ' late' : '');
row.innerHTML = '<span>' + item.qty + 'x ' + escapeHtml(item.name) + (item.ready ? '' : ' <small class="elapsed">&middot; ' + elapsedMin + ' min</small>') + '</span>';
const btn = document.createElement('button');
btn.textContent = item.ready ? 'Listo' : 'Marcar listo';
btn.disabled = item.ready;
btn.onclick = function(){
item.ready = true;
saveState();
renderKitchenView();
renderCanvas();
};
row.appendChild(btn);
itemsWrap.appendChild(row);
});
card.appendChild(itemsWrap);
el.appendChild(card);
});
});
if(!any){
el.innerHTML = '<div class="kview-empty">No hay comandas pendientes.</div>';
}
if(hasNew && isCocina()){ playBeep(); }
knownKitchenItemIds = currentIds;
}

lastLoginHadUsers = state.users && state.users.length > 0;
document.getElementById('appRoot').style.display = 'none';
document.getElementById('loginScreen').style.display = 'flex';
renderLoginScreen();
initFirebase();
const resumed = loadSession();
if(resumed){ loginAs(resumed); }
setInterval(function(){ renderKitchenView(); }, 20000);

const INSTALL_DISMISS_KEY = 'autorest_install_dismissed';
function registerServiceWorker(){
if(!('serviceWorker' in navigator)) return;
window.addEventListener('load', function(){
navigator.serviceWorker.register('./sw.js').catch(function(e){ console.error('SW error', e); });
});
}
function initInstallBanner(){
const banner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const dismissBtn = document.getElementById('installDismissBtn');
if(!banner) return;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
if(isStandalone){ return; }
let dismissed = false;
try{ dismissed = !!localStorage.getItem(INSTALL_DISMISS_KEY); }catch(e){}
if(dismissed) return;
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
e.preventDefault();
deferredPrompt = e;
banner.hidden = false;
});
installBtn.onclick = function(){
if(!deferredPrompt) return;
deferredPrompt.prompt();
deferredPrompt.userChoice.then(function(){ deferredPrompt = null; banner.hidden = true; });
};
dismissBtn.onclick = function(){
banner.hidden = true;
try{ localStorage.setItem(INSTALL_DISMISS_KEY, '1'); }catch(e){}
};
window.addEventListener('appinstalled', function(){ banner.hidden = true; });
}
registerServiceWorker();
initInstallBanner();

</script>
